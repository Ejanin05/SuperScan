name: superscan
description: Control your supermarket spending in real-time with OCR scanning.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Camera & OCR
  camera: ^0.11.0+2
  google_mlkit_text_recognition: ^0.13.1
  image_picker: ^1.1.2

  # Local Database
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  intl: ^0.19.0
  gap: ^3.0.1

  # Utils
  uuid: ^4.4.2
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
