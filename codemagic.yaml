workflows:
  android-debug:
    name: Android Debug
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Get Flutter packages
        script: |
          cd superscan
          flutter pub get

      - name: Diagnostics y limpieza
        script: |
          echo "=== Flutter version ==="
          flutter --version

          echo ""
          echo "=== local.properties ==="
          cat superscan/android/local.properties 2>/dev/null || echo "(no existe)"

          echo ""
          echo "=== app/build.gradle ==="
          cat superscan/android/app/build.gradle

          echo ""
          echo "=== settings.gradle ==="
          cat superscan/android/settings.gradle

          echo ""
          echo "=== gradle.properties ==="
          cat superscan/android/gradle.properties

          echo ""
          echo "=== .flutter-plugins ==="
          cat superscan/.flutter-plugins 2>/dev/null || echo "(no existe)"

          echo ""
          echo "=== Buscando GeneratedPluginRegistrant en src/ ==="
          find superscan/android/app/src -name "GeneratedPluginRegistrant.java" 2>/dev/null || echo "(no encontrado)"

          echo ""
          REGISTRANT="superscan/android/app/src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java"
          if [ -f "$REGISTRANT" ]; then
            echo "=== STALE FILE ENCONTRADO — contenido: ==="
            cat "$REGISTRANT"
            echo ""
            echo "=== Eliminando archivo stale ==="
            rm "$REGISTRANT"
            echo "Eliminado exitosamente."
          else
            echo "=== No existe archivo stale (correcto) ==="
          fi

      - name: Build Android APK
        script: |
          cd superscan
          flutter build apk --debug --no-pub

    artifacts:
      - superscan/build/**/outputs/**/*.apk
      - superscan/build/**/outputs/**/mapping.txt
